apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: monitoring-dev
resources:
  - ../../base
patches:
  - target:
      kind: Namespace
      name: monitoring-template
    patch: |-
      - op: replace
        path: /metadata/name
        value: monitoring-dev
commonLabels:
  environment: dev
