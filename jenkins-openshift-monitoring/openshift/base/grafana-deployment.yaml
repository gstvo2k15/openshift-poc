apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: grafana
          image: grafana/grafana:12.0.2
          imagePullPolicy: IfNotPresent
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom: {secretKeyRef: {name: grafana-admin, key: username}}
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom: {secretKeyRef: {name: grafana-admin, key: password}}
            - {name: GF_USERS_ALLOW_SIGN_UP, value: "false"}
            - {name: GF_SERVER_ROOT_URL, value: "%(protocol)s://%(domain)s/"}
          ports:
            - name: http
              containerPort: 3000
          readinessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet: {path: /api/health, port: http}
            initialDelaySeconds: 45
            periodSeconds: 15
          resources:
            requests: {cpu: 100m, memory: 256Mi}
            limits: {cpu: "1", memory: 1Gi}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            runAsNonRoot: true
          volumeMounts:
            - {name: data, mountPath: /var/lib/grafana}
            - {name: datasource, mountPath: /etc/grafana/provisioning/datasources, readOnly: true}
            - {name: provider, mountPath: /etc/grafana/provisioning/dashboards, readOnly: true}
            - {name: dashboard, mountPath: /var/lib/grafana/dashboards, readOnly: true}
      volumes:
        - name: data
          persistentVolumeClaim: {claimName: grafana-data}
        - name: datasource
          configMap: {name: grafana-datasource}
        - name: provider
          configMap: {name: grafana-dashboard-provider}
        - name: dashboard
          configMap: {name: grafana-dashboard-overview}
